name: GitHub Packages

# Mirrors the @conform-ed/* packages to the GitHub Packages npm registry (npm.pkg.github.com).
# This is the INTERNAL channel — GitHub Packages requires auth even to install, so it is for
# authenticated same-org consumers (e.g. the emergent app), not the public. npmjs.com stays the
# public-facing registry (mirrored manually via `bun run release:npm <tag>`).
#
#   push to main  -> dev channel:    <version>-dev.<shortSha>  @ dist-tag `dev`
#   semver tag    -> release parity: the tagged version        @ dist-tag `latest`
#
# Publishing is gated on validation (ADR-0016 §7): the publish job needs a green `validate:full`.
# conform-ed's interop/container lanes (lrs/cmi5/lti13) keep their ADR-0015 cadence and are NOT in
# this gate (they depend on external systems).
on:
  push:
    branches: [main]
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:

concurrency:
  group: gh-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun run validate:full

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch all tags so the dev channel can sort above the latest release
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - run: bun run build
      - name: Configure GitHub Packages registry + auth
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "@conform-ed:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}"
          } >> .npmrc
      - name: Publish to GitHub Packages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: bun run scripts/publish-github-packages.ts
