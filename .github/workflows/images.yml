name: Images

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: Release tag to publish (for example 0.1.0 or 0.1.0-rc.1)
        required: true
        type: string
      publish_latest:
        description: Also publish latest tags
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Resolve image version tag
        env:
          EVENT_VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref_name }}
        run: |
          echo "VERSION_TAG=${EVENT_VERSION_TAG}" >> "$GITHUB_ENV"
      - name: Resolve latest tagging
        env:
          IS_RELEASE_EVENT: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish_latest) }}
        run: |
          if [[ "${IS_RELEASE_EVENT}" == "true" ]] && [[ "${VERSION_TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "IMAGE_TAG_LATEST=1" >> "$GITHUB_ENV"
          fi
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build images
        run: bun run images:build
        env:
          IMAGE_DRY_RUN: "0"
          IMAGE_REGISTRY: ghcr.io
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
          GITHUB_SHA: ${{ github.sha }}
      - name: Publish images
        run: bun run images:publish:ghcr
        env:
          IMAGE_DRY_RUN: "0"
          IMAGE_REGISTRY: ghcr.io
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
          GITHUB_SHA: ${{ github.sha }}
      - name: Write release manifest
        run: bun run images:manifest
        env:
          IMAGE_REGISTRY: ghcr.io
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
          VERSION_TAG: ${{ env.VERSION_TAG }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_RELEASE_MANIFEST_PATH: tmp/agents/releases/oci-release-manifest.json
      - name: Smoke verify published images
        run: bun run images:smoke
        env:
          IMAGE_REGISTRY: ghcr.io
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
          VERSION_TAG: ${{ env.VERSION_TAG }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_RELEASE_MANIFEST_PATH: tmp/agents/releases/oci-release-manifest.json
